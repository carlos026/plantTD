<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plant TD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="board.css" type="text/css">
<script type="text/javascript" src="js/constants.js"></script>
<script type="text/javascript" src="js/map.js"></script>
<script type="text/javascript" src="js/turret.js"></script>
<script type="text/javascript" src="js/minion.js"></script>
<script type="text/javascript" src="js/player-data.js"></script>
<script type="text/javascript" src="js/tower-defense.js"></script>
<script type="text/javascript" src="js/mobile.js"></script>
</head>
<body>
    <!-- ── NICKNAME SCREEN ─────────────────────────────── -->
    <div id="nicknameScreen" class="nickname-overlay">
        <div class="nickname-panel">
            <h1 class="nickname-title">PLANT TD</h1>
            <p class="nickname-sub">Enter your nickname to play</p>
            <input
                type="text"
                id="nicknameInput"
                class="nickname-input"
                placeholder="Nickname..."
                maxlength="20"
                autocomplete="off"
                onkeydown="if(event.key==='Enter') submitNickname()"
            >
            <p id="nicknameMessage" class="nickname-message" style="display:none;"></p>
            <button class="nickname-btn" onclick="submitNickname()">PLAY</button>
        </div>
    </div>

    <!-- ── PLAYER HUD ──────────────────────────────────── -->
    <div id="playerHud" class="player-hud" style="display:none;">
        <div class="hud-row">
            <span class="hud-label">👤 Player</span>
            <span class="hud-value hud-nickname" id="hudNickname">—</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">📈 Record</span>
            <span class="hud-value" id="hudRecord">0</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">🌱 Seeds</span>
            <span class="hud-value hud-seeds" id="hudSeeds">0</span>
        </div>
    </div>
    <div class="character-info">
        <p class="panel-title">&#9834; Soundtrack</p>
        <table>
            <td>
                <button class="soundtrackbtn" onclick="cycleVolume()" id="volumeBtn">&#128266; 100%</button>
            </td>
            <td>
                <button class="soundtrackbtn" onclick="playAudio()" id="play"  style="display: block;">&#9654; Play</button>
                <button class="soundtrackbtn" onclick="pauseAudio()" id="pause" style="display: none;">&#9646;&#9646; Pause</button>
            </td>
        </table>
    </div>
    <div id="registrationForm" class="character-info" style="display: none;">
        <h1>Turret Upgrade</h1>
        <div class="info-item">
            <span>Name</span>
            <span id="upgName"></span>
        </div>
        <div class="info-item">
            <span>Level</span>
            <span id="upgLevel"></span>
        </div>
        <div class="info-item">
            <span>Damage</span>
            <span id="upgDamage"></span>
        </div>
        <div class="info-item">
            <span>Range</span>
            <span id="range"></span>
        </div>
        <div class="info-item">
            <span>Cooldown</span>
            <span id="upgCooldown"></span>
        </div>
        <div class="info-item" id="ammoRow" style="display: none;">
            <span>Ammo</span>
            <span id="upgAmmo"></span>
        </div>
        <div class="info-item" id="ammoBuyRow" style="display: none;">
            <div class="ammo-queue-wrap">
                <div class="ammo-queue-slots">
                    <div class="ammo-slot" id="ammoSlot0"><div class="ammo-slot-fill"></div><span class="ammo-slot-icon">&#128640;</span></div>
                    <div class="ammo-slot" id="ammoSlot1"><div class="ammo-slot-fill"></div><span class="ammo-slot-icon">&#128640;</span></div>
                    <div class="ammo-slot" id="ammoSlot2"><div class="ammo-slot-fill"></div><span class="ammo-slot-icon">&#128640;</span></div>
                    <div class="ammo-slot" id="ammoSlot3"><div class="ammo-slot-fill"></div><span class="ammo-slot-icon">&#128640;</span></div>
                    <div class="ammo-slot" id="ammoSlot4"><div class="ammo-slot-fill"></div><span class="ammo-slot-icon">&#128640;</span></div>
                </div>
                <button class="ammo-buy-btn" id="ammoBuyBtn" onclick="btnBuyAmmoClick()" type="button">$50 | Buy</button>
            </div>
        </div>
        <div class="info-item" id="overheatRow" style="display: none;">
            <span>Overheat</span>
            <span id="upgOverheat" class="overheat-text"></span>
        </div>
        <div class="info-item" id="stormToggleRow" style="display: none;">
            <span>Active</span>
            <button class="storm-toggle-btn storm-toggle-on" id="stormToggleBtn" onclick="toggleStormCannon()">On</button>
        </div>
        <div class="info-item btn-row">
            <button class="sellbtn" id="sellBtn" onclick="btnSellTurretClick()" type="sellbutton">Sell!</button>
            <button class="upgradebutton" id="upgBtn" onclick="btnUpgradeTurretClick()" type="button">Upgrade!</button>
        </div>
        <input class="text" id="upgTurretId" hidden>
    </div>
    <div id="damageStatsPanel" class="character-info" style="display: none;">
        <h1>Damage Stats</h1>
        <div id="damageStatsList" class="dmg-list"></div>
    </div>
    <div id="turretShopInfoDialog" class="character-info" style="display: none;">
        <h1>Turret Info</h1>
        <div class="info-item">
            <span>Name</span>
            <span id="shopInfoName"></span>
        </div>
        <div class="shop-info-desc">
            <span id="shopInfoDesc"></span>
        </div>
        <div class="info-item">
            <span>Damage</span>
            <span id="shopInfoDamage"></span>
        </div>
        <div class="info-item">
            <span>Range</span>
            <span id="shopInfoRange"></span>
        </div>
        <div class="info-item">
            <span>Cooldown</span>
            <span id="shopInfoCooldown"></span>
        </div>
        <div class="info-item">
            <span>Cost</span>
            <span id="shopInfoCost"></span>
        </div>
    </div>
    <div id="enemyInfoDialog" class="character-info" style="display: none;">
        <h1>Enemy Info</h1>
        <div class="info-item">
            <span>Name</span>
            <span id="enemyName"></span>
        </div>
        <div class="info-item enemy-hp-item">
            <span>HP</span>
            <div class="enemy-hp-wrap">
                <progress id="enemyHpBar" class="enemy-hp-bar" value="0" max="100"></progress>
                <span id="enemyHpText" class="enemy-hp-text"></span>
            </div>
        </div>
        <div class="info-item">
            <span>Speed</span>
            <span id="enemySpeed"></span>
        </div>
    </div>
</body>
</html>
